name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: docker build -t tshepiso-webserver .

      - name: Run container
        run: docker run -d -p 8080:80 --name web-test tshepiso-webserver

      - name: Test webserver
        run: |
          sleep 5
          curl -f http://localhost:8080

      - name: Stop container
        run: docker stop web-test
